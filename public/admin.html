<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasury Aesthetics · Pass Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #C9A55A;
      --gold-dim:  rgba(201,165,90,0.18);
      --charcoal:  #161614;
      --mid:       #1E1E1C;
      --light:     #2A2A27;
      --cream:     #F5F0E8;
      --cream-dim: rgba(245,240,232,0.45);
      --green:     #4CAF7D;
      --red:       #E05C5C;
      --amber:     #C9A55A;
    }

    html, body {
      min-height: 100vh;
      background: var(--charcoal);
      color: var(--cream);
      font-family: 'Georgia', serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px 60px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,165,90,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,165,90,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .header { text-align: center; }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .headline { font-size: 26px; font-weight: 400; line-height: 1.2; }
    .rule {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 14px auto 0;
    }

    .card {
      background: var(--mid);
      border: 1px solid var(--gold-dim);
      border-radius: 18px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group { display: flex; flex-direction: column; gap: 7px; }
    label { font-size: 10px; letter-spacing: 2px; color: var(--gold); }

    input[type="password"],
    select {
      width: 100%;
      background: var(--light);
      border: 1px solid rgba(201,165,90,0.22);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--cream);
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus,
    select:focus { border-color: rgba(201,165,90,0.55); }
    select option { background: #2A2A27; }

    .sync-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      border: none;
      border-radius: 12px;
      color: var(--charcoal);
      font-size: 14px;
      font-family: 'Georgia', serif;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .sync-btn:hover:not(:disabled) { background: #E2C47C; }
    .sync-btn:disabled { opacity: 0.55; cursor: default; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(22,22,20,0.3);
      border-top-color: var(--charcoal);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .sync-btn.loading .spinner { display: block; }
    .sync-btn.loading .btn-text::after { content: 'Running…'; }
    .sync-btn:not(.loading) .btn-text::after { content: 'Run Pass Sync'; }

    /* Results */
    .results { display: none; flex-direction: column; gap: 12px; }
    .results.visible { display: flex; }

    .result-meta {
      font-size: 11px;
      color: var(--cream-dim);
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.2px;
    }

    .stat-row {
      display: flex;
      gap: 10px;
    }
    .stat {
      flex: 1;
      background: var(--light);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid transparent;
    }
    .stat.sent   { border-color: rgba(76,175,125,0.3);  }
    .stat.skip   { border-color: rgba(201,165,90,0.2);  }
    .stat.err    { border-color: rgba(224,92,92,0.3);   }
    .stat-num    { font-size: 26px; font-weight: 400; line-height: 1; margin-bottom: 4px; }
    .stat.sent .stat-num { color: var(--green); }
    .stat.skip .stat-num { color: var(--amber); }
    .stat.err  .stat-num { color: var(--red);   }
    .stat-label  { font-size: 9px; letter-spacing: 2px; color: var(--cream-dim); }

    .client-list {
      background: var(--light);
      border-radius: 10px;
      border: 1px solid var(--gold-dim);
      overflow: hidden;
    }
    .client-list-header {
      padding: 9px 14px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--gold);
      border-bottom: 1px solid var(--gold-dim);
    }
    .client-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      font-size: 12px;
      font-family: -apple-system, sans-serif;
      border-bottom: 1px solid rgba(201,165,90,0.07);
    }
    .client-row:last-child { border-bottom: none; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-sent { background: var(--green); }
    .dot-skip { background: var(--amber); opacity: 0.5; }
    .dot-err  { background: var(--red); }
    .client-name  { flex: 1; color: var(--cream); }
    .client-email { color: var(--cream-dim); font-size: 11px; }
    .client-reason { color: var(--cream-dim); font-size: 11px; font-style: italic; }

    .error-box {
      background: rgba(224,92,92,0.1);
      border: 1px solid rgba(224,92,92,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #E8A0A0;
      font-family: -apple-system, sans-serif;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header animate">
    <p class="eyebrow">TREASURY AESTHETICS</p>
    <h1 class="headline">Pass Sync Admin</h1>
    <div class="rule"></div>
  </div>

  <div class="card animate">
    <div class="field-group">
      <label for="secret">ACCESS KEY</label>
      <input type="password" id="secret" placeholder="Enter your admin key" autocomplete="current-password" />
    </div>

    <div class="field-group">
      <label for="window">LOOK BACK</label>
      <select id="window">
        <option value="24">Last 24 hours</option>
        <option value="168">Last 7 days</option>
        <option value="720" selected>Last 30 days</option>
        <option value="4380">Last 6 months</option>
        <option value="8760">All time (1 year)</option>
      </select>
    </div>

    <button class="sync-btn" id="sync-btn" onclick="runSync()">
      <div class="spinner"></div>
      <span class="btn-text"></span>
    </button>

    <div class="results" id="results"></div>
  </div>

  <p style="text-align:center;font-size:11px;color:rgba(245,240,232,0.2);font-family:-apple-system,sans-serif;">
    Clients already sent a pass are tracked and skipped automatically.
  </p>

</div>

<script>
  async function runSync() {
    const secret = document.getElementById("secret").value.trim();
    if (!secret) {
      alert("Please enter your access key.");
      return;
    }

    const hours   = document.getElementById("window").value;
    const btn     = document.getElementById("sync-btn");
    const results = document.getElementById("results");

    btn.classList.add("loading");
    btn.disabled = true;
    results.classList.remove("visible");

    try {
      const resp = await fetch(`/api/sync-passes?hours=${hours}`, {
        headers: { "Authorization": `Bearer ${secret}` },
      });

      const data = await resp.json();

      if (!resp.ok) {
        showError(results, data.error || "Unknown error");
        return;
      }

      showResults(results, data);

    } catch (err) {
      showError(results, "Network error — check your connection and try again.");
    } finally {
      btn.classList.remove("loading");
      btn.disabled = false;
    }
  }

  function showError(container, message) {
    container.innerHTML = `<div class="error-box">${escHtml(message)}</div>`;
    container.classList.add("visible");
  }

  function showResults(container, data) {
    const since = data.since ? new Date(data.since).toLocaleString("en-CA", {
      dateStyle: "medium", timeStyle: "short"
    }) : "—";

    const sentRows   = (data.sent   || []).map(c => clientRow("sent", c.name, c.email)).join("");
    const skipRows   = (data.skipped|| []).map(c => clientRow("skip", c.name, c.reason)).join("");
    const errRows    = (data.errors || []).map(c => clientRow("err",  c.name, c.error)).join("");

    const allRows = sentRows + skipRows + errRows;

    container.innerHTML = `
      <p class="result-meta">Checked from ${escHtml(since)} · ${data.total ?? 0} clients found</p>
      <div class="stat-row">
        <div class="stat sent">
          <div class="stat-num">${(data.sent || []).length}</div>
          <div class="stat-label">SENT</div>
        </div>
        <div class="stat skip">
          <div class="stat-num">${(data.skipped || []).length}</div>
          <div class="stat-label">SKIPPED</div>
        </div>
        <div class="stat err">
          <div class="stat-num">${(data.errors || []).length}</div>
          <div class="stat-label">ERRORS</div>
        </div>
      </div>
      ${allRows ? `
      <div class="client-list">
        <div class="client-list-header">RESULTS</div>
        ${allRows}
      </div>` : ""}
    `;
    container.classList.add("visible");
  }

  function clientRow(type, name, detail) {
    const dotClass = { sent: "dot-sent", skip: "dot-skip", err: "dot-err" }[type];
    const detailClass = type === "sent" ? "client-email" : "client-reason";
    return `
      <div class="client-row">
        <div class="dot ${dotClass}"></div>
        <span class="client-name">${escHtml(name || "Unknown")}</span>
        <span class="${detailClass}">${escHtml(detail || "")}</span>
      </div>`;
  }

  function escHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Submit on Enter
  document.getElementById("secret").addEventListener("keydown", e => {
    if (e.key === "Enter") runSync();
  });
</script>

</body>
</html>
