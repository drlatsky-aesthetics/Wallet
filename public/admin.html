<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treasury Aesthetics · Pass Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #C9A55A;
      --gold-dim: rgba(201,165,90,0.18);
      --charcoal: #161614;
      --mid:      #1E1E1C;
      --light:    #2A2A27;
      --cream:    #F5F0E8;
      --faint:    rgba(245,240,232,0.4);
      --green:    #4CAF7D;
      --red:      #E05C5C;
    }

    html, body {
      min-height: 100vh;
      background: var(--charcoal);
      color: var(--cream);
      font-family: Georgia, serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px 80px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,165,90,0.03) 1px, transparent 1px),
        linear-gradient(90deg,rgba(201,165,90,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .wrapper { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 22px; position: relative; z-index: 1; }

    /* Header */
    .header { text-align: center; }
    .eyebrow { font-size: 10px; letter-spacing: 4px; color: var(--gold); margin-bottom: 10px; }
    .headline { font-size: 26px; font-weight: 400; }
    .rule { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 14px auto 0; }

    /* Cards */
    .card { background: var(--mid); border: 1px solid var(--gold-dim); border-radius: 18px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    /* Form fields */
    .row { display: flex; gap: 12px; }
    .row .field-group { flex: 1; }
    .field-group { display: flex; flex-direction: column; gap: 7px; }
    label { font-size: 10px; letter-spacing: 2px; color: var(--gold); }

    input[type="password"], select {
      width: 100%; background: var(--light); border: 1px solid rgba(201,165,90,0.22);
      border-radius: 10px; padding: 11px 14px; color: var(--cream);
      font-size: 14px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      outline: none; transition: border-color .2s;
    }
    input[type="password"]:focus, select:focus { border-color: rgba(201,165,90,0.55); }
    select option { background: #2A2A27; }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px; border: none; border-radius: 12px;
      font-size: 14px; font-family: Georgia, serif; cursor: pointer;
      transition: opacity .2s, background .2s; white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-gold { background: var(--gold); color: var(--charcoal); }
    .btn-gold:hover:not(:disabled) { background: #E2C47C; }
    .btn-outline { background: transparent; color: var(--gold); border: 1px solid rgba(201,165,90,0.4); }
    .btn-outline:hover:not(:disabled) { border-color: var(--gold); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover:not(:disabled) { background: #5DC98E; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(0,0,0,.25); border-top-color: currentColor;
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    .loading .spinner { display: block; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar-left { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
    .toolbar-meta { font-size: 12px; color: var(--faint); font-family: -apple-system, sans-serif; }

    /* Client list */
    .client-list { display: flex; flex-direction: column; border: 1px solid var(--gold-dim); border-radius: 12px; overflow: hidden; }
    .list-header {
      display: grid; grid-template-columns: 28px 1fr 1fr 80px;
      gap: 10px; padding: 9px 14px;
      font-size: 9px; letter-spacing: 2px; color: var(--gold);
      border-bottom: 1px solid var(--gold-dim); background: rgba(201,165,90,0.05);
    }

    .client-row {
      display: grid; grid-template-columns: 28px 1fr 1fr 80px;
      gap: 10px; align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(201,165,90,0.07);
      transition: background .15s;
    }
    .client-row:last-child { border-bottom: none; }
    .client-row:hover { background: rgba(201,165,90,0.04); }
    .client-row.sent-row { opacity: .55; }
    .client-row.no-email-row { opacity: .4; }

    /* Custom checkbox */
    .cb-wrap { display: flex; align-items: center; justify-content: center; }
    input[type="checkbox"] { display: none; }
    .cb {
      width: 18px; height: 18px; border-radius: 5px;
      border: 1.5px solid rgba(201,165,90,0.35);
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: border-color .15s, background .15s;
    }
    input[type="checkbox"]:checked + .cb { background: var(--gold); border-color: var(--gold); }
    input[type="checkbox"]:disabled + .cb { opacity: .3; cursor: default; }
    .cb svg { display: none; }
    input[type="checkbox"]:checked + .cb svg { display: block; }

    .client-name { font-size: 13px; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-email { font-size: 12px; color: var(--faint); font-family: -apple-system, sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Status pill */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 10px; letter-spacing: 0.5px; white-space: nowrap;
      font-family: -apple-system, sans-serif;
    }
    .pill-unsent { background: rgba(201,165,90,0.12); color: var(--gold); }
    .pill-sent   { background: rgba(76,175,125,0.12); color: var(--green); }
    .pill-error  { background: rgba(224,92,92,0.12);  color: var(--red); }
    .pill-noemail{ background: rgba(245,240,232,0.06); color: var(--faint); }
    .pill-sending{ background: rgba(201,165,90,0.12); color: var(--gold); }

    .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* Send results summary */
    .send-summary { display: flex; gap: 10px; }
    .stat { flex:1; background: var(--light); border-radius: 10px; padding: 14px; text-align: center; border: 1px solid transparent; }
    .stat.s-sent { border-color: rgba(76,175,125,0.3); }
    .stat.s-err  { border-color: rgba(224,92,92,0.3); }
    .stat-num  { font-size: 28px; line-height: 1; margin-bottom: 4px; }
    .stat.s-sent .stat-num { color: var(--green); }
    .stat.s-err  .stat-num { color: var(--red); }
    .stat-label { font-size: 9px; letter-spacing: 2px; color: var(--faint); }

    .error-box { background: rgba(224,92,92,.1); border: 1px solid rgba(224,92,92,.3); border-radius:10px; padding:12px 16px; font-size:13px; color:#E8A0A0; font-family:-apple-system,sans-serif; }

    /* Hidden */
    .hidden { display: none !important; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .animate { animation: fadeUp .35s ease both; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header animate">
    <p class="eyebrow">TREASURY AESTHETICS</p>
    <h1 class="headline">Pass Sync Admin</h1>
    <div class="rule"></div>
  </div>

  <!-- Step 1: Find clients -->
  <div class="card animate" id="find-card">
    <div class="row">
      <div class="field-group" style="flex:1.4">
        <label for="secret">ACCESS KEY</label>
        <input type="password" id="secret" placeholder="Admin key" autocomplete="current-password" />
      </div>
      <div class="field-group" style="flex:1">
        <label for="window">LOOK BACK</label>
        <select id="window">
          <option value="24">24 hours</option>
          <option value="168">7 days</option>
          <option value="720" selected>30 days</option>
          <option value="4380">6 months</option>
          <option value="8760">All time</option>
        </select>
      </div>
    </div>
    <button class="btn btn-gold" id="find-btn" onclick="findClients()">
      <div class="spinner"></div>
      <span id="find-label">Find Clients</span>
    </button>
  </div>

  <!-- Step 2: Client list + send -->
  <div class="card animate hidden" id="list-card">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-outline" style="padding:8px 14px;font-size:12px;" onclick="selectUnsent()">Select unsent</button>
        <button class="btn btn-outline" style="padding:8px 14px;font-size:12px;" onclick="selectAll()">Select all</button>
        <button class="btn btn-outline" style="padding:8px 14px;font-size:12px;" onclick="clearAll()">Clear</button>
      </div>
      <span class="toolbar-meta" id="sel-count">0 selected</span>
    </div>

    <!-- Column headers -->
    <div class="list-header">
      <div></div>
      <div>NAME</div>
      <div>EMAIL</div>
      <div>STATUS</div>
    </div>

    <!-- Rows injected here -->
    <div class="client-list" id="client-list"></div>

    <!-- Send button -->
    <button class="btn btn-green" id="send-btn" onclick="sendToSelected()" disabled>
      <div class="spinner"></div>
      <span id="send-label">Send Passes</span>
    </button>

  </div>

  <!-- Step 3: Send results -->
  <div class="card animate hidden" id="results-card">
    <div class="send-summary" id="send-summary"></div>
  </div>

</div>

<script>
  let allClients  = [];  // full list from Phorest
  let clientStatus = {}; // id → current status pill state

  // ── Step 1: Find clients ────────────────────────────────────────────────────

  async function findClients() {
    const secret = document.getElementById("secret").value.trim();
    if (!secret) { alert("Enter your access key first."); return; }

    const btn   = document.getElementById("find-btn");
    const label = document.getElementById("find-label");
    setLoading(btn, label, true, "Searching…");

    document.getElementById("list-card").classList.add("hidden");
    document.getElementById("results-card").classList.add("hidden");

    try {
      const hours = document.getElementById("window").value;
      const resp  = await fetch(`/api/list-clients?hours=${hours}`, {
        headers: { "Authorization": `Bearer ${secret}` },
      });
      const data  = await resp.json();

      if (!resp.ok) { showFindError(data.error || "Unknown error"); return; }

      allClients   = data.clients || [];
      clientStatus = {};
      allClients.forEach(c => { clientStatus[c.id] = c.status; });

      renderClientList();
      document.getElementById("list-card").classList.remove("hidden");
      updateSelCount();

    } catch (e) {
      showFindError("Network error — check your connection.");
    } finally {
      setLoading(btn, label, false, "Find Clients");
    }
  }

  function showFindError(msg) {
    const card = document.getElementById("find-card");
    let box = document.getElementById("find-err");
    if (!box) {
      box = document.createElement("div");
      box.id = "find-err";
      box.className = "error-box";
      card.appendChild(box);
    }
    box.textContent = msg;
  }

  // ── Render client rows ──────────────────────────────────────────────────────

  function renderClientList() {
    const list = document.getElementById("client-list");
    list.innerHTML = "";

    allClients.forEach(c => {
      const isSelectable = c.email && c.status !== "sent";
      const isPreChecked = isSelectable; // check unsent & errors by default
      const rowClass = c.status === "sent" ? "sent-row" : c.status === "no-email" ? "no-email-row" : "";

      const row = document.createElement("div");
      row.className = `client-row ${rowClass}`;
      row.id = `row-${c.id}`;
      row.innerHTML = `
        <div class="cb-wrap">
          <label>
            <input type="checkbox"
              id="cb-${esc(c.id)}"
              data-id="${esc(c.id)}"
              ${isPreChecked ? "checked" : ""}
              ${!isSelectable ? "disabled" : ""}
              onchange="updateSelCount()"
            />
            <div class="cb">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4l3 3 5-6" stroke="#161614" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </label>
        </div>
        <div class="client-name">${esc(fullName(c))}</div>
        <div class="client-email">${esc(c.email || "—")}</div>
        <div id="pill-${esc(c.id)}">${pillHtml(c.status)}</div>
      `;
      list.appendChild(row);
    });
  }

  function pillHtml(status) {
    const map = {
      unsent:   ["pill-unsent", "NOT SENT"],
      sent:     ["pill-sent",   "SENT"],
      "no-email": ["pill-noemail", "NO EMAIL"],
      sending:  ["pill-sending", "SENDING…"],
      done:     ["pill-sent",   "SENT ✓"],
      error:    ["pill-error",  "ERROR"],
    };
    const [cls, label] = map[status] || ["pill-noemail", status.toUpperCase()];
    return `<span class="pill ${cls}"><span class="pill-dot"></span>${label}</span>`;
  }

  // ── Selection helpers ───────────────────────────────────────────────────────

  function getCheckboxes() {
    return Array.from(document.querySelectorAll("#client-list input[type=checkbox]"));
  }

  function selectUnsent() {
    getCheckboxes().forEach(cb => {
      if (!cb.disabled) {
        const id     = cb.dataset.id;
        const client = allClients.find(c => c.id === id);
        cb.checked = client && client.status !== "sent";
      }
    });
    updateSelCount();
  }

  function selectAll() {
    getCheckboxes().forEach(cb => { if (!cb.disabled) cb.checked = true; });
    updateSelCount();
  }

  function clearAll() {
    getCheckboxes().forEach(cb => { if (!cb.disabled) cb.checked = false; });
    updateSelCount();
  }

  function updateSelCount() {
    const n   = getCheckboxes().filter(cb => cb.checked).length;
    const btn = document.getElementById("send-btn");
    document.getElementById("sel-count").textContent = `${n} selected`;
    document.getElementById("send-label").textContent = n === 1 ? "Send 1 Pass" : `Send ${n} Passes`;
    btn.disabled = n === 0;
  }

  // ── Step 2: Send selected ───────────────────────────────────────────────────

  async function sendToSelected() {
    const secret   = document.getElementById("secret").value.trim();
    const checked  = getCheckboxes().filter(cb => cb.checked);
    if (checked.length === 0) return;

    const btn   = document.getElementById("send-btn");
    const label = document.getElementById("send-label");
    setLoading(btn, label, true, "Sending…");
    btn.disabled = true;

    const selectedClients = checked.map(cb => allClients.find(c => c.id === cb.dataset.id)).filter(Boolean);

    // Show "sending" pills
    selectedClients.forEach(c => {
      const pill = document.getElementById(`pill-${c.id}`);
      if (pill) pill.innerHTML = pillHtml("sending");
    });

    try {
      const resp = await fetch("/api/send-pass", {
        method:  "POST",
        headers: {
          "Authorization": `Bearer ${secret}`,
          "Content-Type":  "application/json",
        },
        body: JSON.stringify({ clients: selectedClients }),
      });

      const data = await resp.json();

      if (!resp.ok) {
        setLoading(btn, label, false, `Send ${checked.length} Passes`);
        btn.disabled = false;
        // Reset pills
        selectedClients.forEach(c => {
          const pill = document.getElementById(`pill-${c.id}`);
          if (pill) pill.innerHTML = pillHtml(c.status);
        });
        alert(data.error || "Send failed");
        return;
      }

      // Update pills based on results
      (data.sent || []).forEach(c => {
        const pill = document.getElementById(`pill-${c.id}`);
        if (pill) pill.innerHTML = pillHtml("done");
        const row  = document.getElementById(`row-${c.id}`);
        if (row) row.classList.add("sent-row");
        const cb   = document.getElementById(`cb-${c.id}`);
        if (cb) { cb.checked = false; cb.disabled = true; }
        // Update local status so "Select unsent" excludes them
        const client = allClients.find(x => x.id === c.id);
        if (client) client.status = "sent";
      });

      (data.errors || []).forEach(c => {
        const pill = document.getElementById(`pill-${c.id}`);
        if (pill) pill.innerHTML = pillHtml("error");
      });

      // Show summary card
      const sentN = (data.sent || []).length;
      const errN  = (data.errors || []).length;
      document.getElementById("send-summary").innerHTML = `
        <div class="stat s-sent"><div class="stat-num">${sentN}</div><div class="stat-label">SENT</div></div>
        <div class="stat s-err"><div class="stat-num">${errN}</div><div class="stat-label">ERRORS</div></div>
      `;
      document.getElementById("results-card").classList.remove("hidden");

      updateSelCount();

    } catch (e) {
      alert("Network error — try again.");
    } finally {
      setLoading(btn, label, false, "");
      updateSelCount();
    }
  }

  // ── Utilities ───────────────────────────────────────────────────────────────

  function setLoading(btn, label, on, text) {
    btn.classList.toggle("loading", on);
    btn.disabled = on;
    if (label) label.textContent = on ? "" : text;
  }

  function fullName(c) {
    return `${c.firstName || ""} ${c.lastName || ""}`.trim() || "Unknown";
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  // Enter key on secret field triggers find
  document.getElementById("secret").addEventListener("keydown", e => {
    if (e.key === "Enter") findClients();
  });
</script>
</body>
</html>
